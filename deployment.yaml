apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-deployment
  namespace: demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: demo-app

  template:
    metadata:
      labels:
        app: demo-app

    spec:
      containers:
      - name: demo-container
        image: quay.io/gauravkumar9130/nginxdemo

        ports:
        - containerPort: 80
